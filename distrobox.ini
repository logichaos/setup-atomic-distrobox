[system]
image=quay.io/fedora/fedora-toolbox:43
pull=true
replace=true
start_now=true

pre_init_hooks=dnf -y copr enable dejan/lazygit; dnf -y copr enable tofik/nwg-shell; dnf -y copr enable lihaohong/yazi

additional_packages="neovim lazygit yazi nwg-displays rust cargo"

init_hooks=CARGO_INSTALL_ROOT=/usr/local cargo install --locked --bin jj jj-cli; bash -c "$(curl -sLo- https://superfile.dev/install.sh)"

exported_bins="/usr/bin/nvim /usr/bin/lazygit /usr/local/bin/jj /usr/bin/yazi /usr/local/bin/spf"
exported_bins_path=~/.local/bin
exported_apps="nwg-displays"

[dev]
image=quay.io/fedora/fedora-toolbox:43
pull=true
replace=true
start_now=true

additional_packages="dotnet-sdk-10.0 golang npm python3 python3-pip typescript"

init_hooks=curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 11.0 --quality preview --install-dir /usr/share/dotnet; dotnet workload install aspire; npm install -g azure-functions-core-tools@4
