[system]
image=quay.io/fedora/fedora-toolbox:43
pull=true
replace=true
start_now=true

pre_init_hooks=dnf -y copr enable dejan/lazygit; dnf -y copr enable tofik/nwg-shell; dnf -y copr enable lihaohong/yazi

additional_packages="neovim lazygit yazi nwg-displays rust cargo btop atop git-delta zsh"

init_hooks=CARGO_INSTALL_ROOT=/usr/local cargo install --locked --bin jj jj-cli;
init_hooks=curl -fsSL https://superfile.dev/install.sh | bash;
init_hooks=bash /run/host/var/home/zephy/setup/dbox/scripts/install-lazyjournal.sh
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/podman
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/docker

exported_bins="/usr/bin/nvim /usr/bin/lazygit /usr/local/bin/jj /usr/bin/yazi /usr/local/bin/spf /usr/bin/btop /usr/bin/atop /usr/local/bin/lazyjournal /usr/bin/delta"
exported_bins_path=~/.local/bin
exported_apps="nwg-displays"

[dev]
image=quay.io/fedora/fedora-toolbox:43
pull=true
replace=true
start_now=true

additional_packages="dotnet-sdk-10.0 golang npm python3 python3-pip pipx typescript zsh"
init_hooks=curl -sSL https://dot.net/v1/dotnet-install.sh | sudo bash /dev/stdin --channel 11.0 --quality preview --install-dir /usr/lib64/dotnet; chown -R zephy:zephy /run/host/home/zephy/.dotnet /run/host/home/zephy/.nuget /run/host/home/zephy/.local/share/NuGet 2>/dev/null || true;
init_hooks=npm install -g azure-functions-core-tools@4;
init_hooks=PIPX_HOME=/opt/pipx PIPX_BIN_DIR=/usr/local/bin pipx install posting;
init_hooks=curl -sSL https://aspire.dev/install.sh | bash /dev/stdin --install-path /usr/local/bin; chown zephy:zephy /usr/local; for d in /usr/local/dcp /usr/local/managed; do [ -d "$d" ] && chown -R zephy:zephy "$d"; done; chown zephy:zephy /run/host/home/zephy/.local/bin; rm -f /run/host/home/zephy/.local/bin/posting
init_hooks=curl -LsSf https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/usr/local/bin sh
init_hooks=uv tool install specify-cli --from git+https://github.com/github/spec-kit.git
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/podman
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/docker

exported_bins="/usr/local/bin/posting"
exported_bins="/usr/local/bin/aspire"
exported_bins="/usr/lib64/dotnet/dotnet"
exported_bins="/usr/local/bin/uv"
exported_bins="/usr/local/bin/uvx"
exported_bins="/usr/bin/pip"
exported_bins="/usr/bin/pipx"
exported_bins=/home/zephy/.local/share/uv/tools/specify-cli/bin/specify
exported_bins_path=~/.local/bin
